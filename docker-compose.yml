services:
  frontend:
    container_name: frontend
    build:
      context: ./client
      args:
        VITE_API_URL: http://16.176.168.183:3000/api/v1
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - student-network

  backend:
    container_name: backend
    build: ./server
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    depends_on:
      - mongo-db
    networks:
      - student-network

  mongo-db:
    image: mongo:6
    container_name: mongo-db
    volumes:
      - mongo-data:/data/db
    networks:
      - student-network

volumes:
  mongo-data:
    name: mongo-data

networks:
  student-network:
    name: student-network
